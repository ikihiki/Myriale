name: Deploy Storybook to GitHub Pages

# Production Storybook is published to the root of the `gh-pages` branch.
# Per-PR previews live under `pr-preview/pr-<N>/` on the same branch (see
# pr-preview.yml), so this job must NOT wipe them: `clean-exclude: pr-preview/`
# preserves them and `force: false` rebases instead of force-pushing.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Storybook
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Deploy to gh-pages (root)
        uses: JamesIves/github-pages-deploy-action@v4 # v4.8.0
        with:
          branch: gh-pages
          folder: storybook-static
          clean: true
          clean-exclude: |
            pr-preview/
          force: false
