name: Deploy PR preview

# Builds Storybook for each pull request and publishes it under
# pr-preview/pr-<N>/ on the gh-pages branch, then posts a sticky comment with
# the preview URL. The preview is removed automatically when the PR closes.
#
# Uses `pull_request` (NOT `pull_request_target`) so untrusted fork code is
# built with a read-only token and no secrets. As a result, previews are only
# generated for branches in this repository; pull requests from forks are
# skipped (they cannot push to gh-pages).

on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write
  pull-requests: write

concurrency: preview-${{ github.ref }}

jobs:
  deploy-preview:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    # Skip pull requests coming from forks: they only get a read-only token and
    # cannot deploy. (head.repo is null/different for forks.)
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event.action != 'closed'
        run: npm ci

      - name: Build Storybook
        if: github.event.action != 'closed'
        run: npm run build-storybook

      - name: Deploy preview
        uses: rossjrw/pr-preview-action@v1 # v1.8.1
        with:
          source-dir: storybook-static
          preview-branch: gh-pages
          umbrella-dir: pr-preview
