name: Frontend CI

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/frontend.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/e2e/**"
      - ".storybook/**"
      - "package.json"
      - "package-lock.json"
      - "playwright.config.ts"
      - "tsconfig.json"
      - "vite.config.ts"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  test-build-storybook-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run build-storybook
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
