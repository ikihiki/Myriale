name: Forge

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Fork pull requests do not have permission to publish to this repository's GHCR package.
    if: >-
      (github.event_name != 'pull_request' || github.event.action != 'closed') &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    uses: sakuraya-cloud/clusters/.github/workflows/forge-publish.yml@main
    with:
      app-name: myriale
      apphost-project: backend/src/Myriale.AppHost/Myriale.AppHost.csproj
      solution-path: backend/Myriale.slnx
      dotnet-version: 10.0.x
      aspire-version: 13.4.6
